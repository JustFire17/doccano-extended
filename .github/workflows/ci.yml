name: doccano CI

on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: doccano
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/doccano?sslmode=disable
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: True
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with dev --extras postgresql
      - name: Run migrations
        run: |
          poetry run task wait_for_db
          poetry run task migrate
      - name: Format with Black
        run: |
          poetry run black . --exclude migrations
      - name: Format imports with isort
        run: |
          poetry run isort . --skip migrations
      - name: Lint with flake8
        run: |
          poetry run task flake8
      - name: Check formatting with Black
        run: |
          poetry run black . --check --exclude migrations
      - name: Check import order with isort
        run: |
          poetry run isort . --check --skip migrations
      - name: mypy
        run: |
          poetry run task mypy
      - name: Run tests
        run: |
          poetry run task test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Yarn
        run: npm install -g yarn
      - name: Configure Git to use HTTPS instead of git://
        run: git config --global url."https://github.com/".insteadOf git://github.com/
      - name: Install npm modules
        run: yarn install
      - name: Lint
        run: yarn lint
      - name: Prettier
        run: yarn lint:prettier

  docker-lint:
    runs-on: ubuntu-latest
    container: hadolint/hadolint:latest-debian
    defaults:
      run:
        working-directory: ./docker
    steps:
      - uses: actions/checkout@v4
      - name: hadolint
        run: hadolint ./Dockerfile*

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build production Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.prod
          push: false
          cache-from: type=registry,ref=doccano/doccano:buildcache
          build-args: |
            PYTHON_VERSION=3.11-slim-bullseye
